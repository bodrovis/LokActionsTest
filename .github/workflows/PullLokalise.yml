name: Demo pull with tags

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    # types: [opened, synchronize, reopened, ready_for_review]
    
permissions:
  contents: write
  pull-requests: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Pull from Lokalise
        id: lokalise-pull
        uses: lokalise/lokalise-pull-action@v5.2.3
        with:
          api_token: ${{ secrets.LOKALISE_API_TOKEN }}
          project_id: 7565202469c53c30428ce0.33693563
          # translations_path: |
          #   messages
          #   locales
          translations_path: |
            resources/strings/en.lproj
            resources/strings/es.lproj
          # override_branch_name: lokalise-sync
          flat_naming: true
          file_format: strings
          # force_push: true
          # file_ext: json
          skip_include_tags: true
          skip_original_filenames: true
          always_pull_base: true
          # os_platform: "  linux_amd64   "
          additional_params: >
            {
              "original_filenames": false,
              "bundle_structure": "resources/strings/%LANG_ISO%.lproj/Localizable.%FORMAT%",
              "all_platforms": true,
              "language_mapping": [
                {"original_language_iso":"en_US","custom_language_iso":"en"},
                {"original_language_iso":"en_GB","custom_language_iso":"en-GB"}
              ]
            }

